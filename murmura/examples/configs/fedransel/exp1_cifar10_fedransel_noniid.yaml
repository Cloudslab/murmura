# Experiment 1: Convergence + Communication - CIFAR-10 Non-IID with FedRansel
# Claims validated: FedRansel converges; reduces communication

experiment:
  name: "exp1-cifar10-fedransel-noniid"
  seed: 42
  rounds: 300
  verbose: true

topology:
  type: "fully"
  num_nodes: 50

network:
  mode: "centralized"

aggregation:
  algorithm: "fedransel"
  params:
    T_l: 0.5    # Local sampling threshold
    T_g: 1.0    # Global sampling
    tau: 1      # Minimum coverage

attack:
  enabled: false

training:
  local_epochs: 2
  batch_size: 64
  lr: 0.01

data:
  adapter: "cifar10"
  params:
    data_path: "./data/cifar10"
    partition_method: "dirichlet"
    alpha: 0.5    # Non-IID heterogeneity
    normalize: true

model:
  factory: "examples.cifar10.resnet18"
  params:
    num_classes: 10
