# Experiment 1: UCI HAR IID with FedRansel
# Wearable domain, small model, fast iteration

experiment:
  name: "exp1-uci-har-fedransel-iid"
  seed: 42
  rounds: 300
  verbose: true

topology:
  type: "fully"
  num_nodes: 50

network:
  mode: "centralized"

aggregation:
  algorithm: "fedransel"
  params:
    T_l: 0.5
    T_g: 1.0
    tau: 1

attack:
  enabled: false

training:
  local_epochs: 2
  batch_size: 64
  lr: 0.01

data:
  adapter: "wearables.uci_har"
  params:
    data_path: "wearables_datasets/UCI HAR Dataset"
    split: "train"
    partition_method: "iid"
    normalize: true

model:
  factory: "examples.wearables.uci_har"
  params:
    input_dim: 561
    hidden_dims: [256, 128]
    num_classes: 6
