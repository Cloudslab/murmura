# Experiment 1: Convergence + Communication - CIFAR-10 IID with FedRansel
# Claims validated: FedRansel converges; reduces communication

experiment:
  name: "exp1-cifar10-fedransel-iid"
  seed: 42
  rounds: 300
  verbose: true

topology:
  type: "fully"
  num_nodes: 50

network:
  mode: "centralized"

aggregation:
  algorithm: "fedransel"
  params:
    T_l: 0.5    # Local sampling threshold (try 0.3, 0.5, 0.7)
    T_g: 1.0    # Global sampling (keep all common params)
    tau: 1      # Minimum coverage threshold

attack:
  enabled: false

training:
  local_epochs: 2
  batch_size: 64
  lr: 0.01

data:
  adapter: "cifar10"
  params:
    data_path: "./data/cifar10"
    partition_method: "iid"
    normalize: true

model:
  factory: "examples.cifar10.resnet18"
  params:
    num_classes: 10
