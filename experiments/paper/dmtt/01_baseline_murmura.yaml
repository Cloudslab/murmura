# Condition 1 — Baseline MURMURA
# Static topology, FedAvg aggregation, 30 % topology-liar Byzantine nodes.
# Comparison baseline: no mobility, no DMTT trust.
# Backend: simulation (fast, in-process)

experiment:
  name: "DMTT-Baseline-MURMURA"
  seed: 42
  rounds: 50
  verbose: true

topology:
  type: "fully"
  num_nodes: 10
  seed: 12345

aggregation:
  algorithm: "fedavg"
  params: {}

attack:
  enabled: true
  type: "topology_liar"
  percentage: 0.3
  params:
    model_attack_type: "gaussian"
    noise_std: 10.0

training:
  local_epochs: 2
  batch_size: 32
  lr: 0.01
  max_samples: null

data:
  adapter: "wearables.uci_har"
  params:
    data_path: "wearables_datasets/UCI HAR Dataset"
    split: "train"
    partition_method: "dirichlet"
    alpha: 0.5

model:
  factory: "examples.wearables.uci_har"
  params:
    input_dim: 561
    hidden_dims: [256, 128]
    num_classes: 6
    dropout: 0.3

backend: simulation
