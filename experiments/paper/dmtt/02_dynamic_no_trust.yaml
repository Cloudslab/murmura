# Condition 2 — Dynamic MURMURA without trust
# Dynamic topology (mobility model), no DMTT trust protocol.
# Nodes use all G^t direct neighbours each round; liar attack degrades accuracy.
# Backend: distributed (ZMQ, actual separate OS processes)

experiment:
  name: "DMTT-Dynamic-NoTrust"
  seed: 42
  rounds: 50
  verbose: true

topology:
  type: "fully"          # used only to set num_nodes; actual edges come from mobility
  num_nodes: 10
  seed: 12345

aggregation:
  algorithm: "fedavg"
  params: {}

attack:
  enabled: true
  type: "topology_liar"
  percentage: 0.3
  params:
    model_attack_type: "gaussian"
    noise_std: 10.0

training:
  local_epochs: 2
  batch_size: 32
  lr: 0.01
  max_samples: null

data:
  adapter: "wearables.uci_har"
  params:
    data_path: "wearables_datasets/UCI HAR Dataset"
    split: "train"
    partition_method: "dirichlet"
    alpha: 0.5

model:
  factory: "examples.wearables.uci_har"
  params:
    input_dim: 561
    hidden_dims: [256, 128]
    num_classes: 6
    dropout: 0.3

backend: distributed

distributed:
  transport: ipc
  round_duration_s: 120.0
  startup_grace_s: 8.0

# Dynamic topology — edges vary per round via random-walk mobility
mobility:
  area_size: 100.0
  comm_range: 40.0      # ~40 % average connectivity at 10 nodes in 100×100 arena
  max_speed: 8.0
  seed: 42
  ensure_connected: true

# dmtt: null            # leave absent to use base NodeProcess (no trust)
